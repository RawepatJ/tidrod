services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tidrod
      POSTGRES_PASSWORD: tidrod_secret
      POSTGRES_DB: tidrod
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tidrod"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./back
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://tidrod:tidrod_secret@db:5432/tidrod
      JWT_SECRET: change_me_in_production_jwt_secret_key_2026
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:-trip-photos}
      PORT: 5000
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./back/src:/app/src

  frontend:
    build: ./front
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
      NEXT_PUBLIC_WS_URL: http://localhost:5000
    depends_on:
      - backend

volumes:
  pgdata:
